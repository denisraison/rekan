tests:
  # Generate post for a customer
  - id: w3_generate_post
    message: "gera post pra Patricia"
    operator: { name: "Elenice", jid: "5511999990000" }
    context: |
      Operadora: Elenice

      Clientes ativas: 3
        - Patricia (Salão de Beleza, Belo Horizonte)
        - Maria (Confeitaria, São Paulo)
        - Joana (Loja de Roupas, Rio de Janeiro)

      Posts gerados (total): 10
    graders:
      - type: deterministic
        field: action_type
        equals: POST_GENERATE
      - type: llm_judge
        judge: confirmation_flow
        criteria: "Agente confirma antes de gerar: menciona Patricia e pede confirmação"

  # Review pending posts for a customer (LLM answers directly from context)
  - id: w3_list_pending_posts
    message: "quais posts tão pendentes da Patricia?"
    operator: { name: "Elenice", jid: "5511999990000" }
    context: |
      Operadora: Elenice

      Clientes ativas: 3
        - Patricia (Salão de Beleza, Belo Horizonte)
        - Maria (Confeitaria, São Paulo)
        - Joana (Loja de Roupas, Rio de Janeiro)

      Posts pendentes de revisão: 2
        - Patricia: "Hoje no salão foi dia de transformação..." (post_001)
        - Patricia: "Cabelo bonito começa com produto bom..." (post_002)

      Posts gerados (total): 10
    graders:
      - type: deterministic
        field: has_reply
        equals: "true"
      - type: llm_judge
        judge: no_hallucination
        criteria: "Agente lista apenas os posts pendentes da Patricia que estão no contexto"

  # Approve a post
  - id: w3_approve_post
    message: "aprova o primeiro post da Patricia"
    operator: { name: "Bruna", jid: "5511999991111" }
    context: |
      Operadora: Bruna

      Clientes ativas: 2
        - Patricia (Salão de Beleza, Belo Horizonte)
        - Maria (Confeitaria, São Paulo)

      Posts pendentes de revisão: 1
        - Patricia: "Hoje no salão foi dia de transformação..." (post_001)

      Posts gerados (total): 5
    graders:
      - type: deterministic
        field: action_type
        equals: POST_APPROVE
      - type: llm_judge
        judge: confirmation_flow
        criteria: "Agente confirma a aprovação do post, mencionando de qual cliente é"

  # Reject a post with feedback
  - id: w3_reject_post
    message: "rejeita o post da Maria, tá muito genérico"
    operator: { name: "Elenice", jid: "5511999990000" }
    context: |
      Operadora: Elenice

      Clientes ativas: 2
        - Patricia (Salão de Beleza, Belo Horizonte)
        - Maria (Confeitaria, São Paulo)

      Posts pendentes de revisão: 1
        - Maria: "Bolo caseiro é sempre a melhor pedida..." (post_003)

      Posts gerados (total): 8
    graders:
      - type: deterministic
        field: action_type
        equals: POST_REJECT
      - type: llm_judge
        judge: confirmation_flow
        criteria: "Agente confirma a rejeição com o feedback mencionado"

  # Business card photo -> creation flow
  - id: w3_business_card_photo
    message: "[Imagem: Cartão de visita. Nome: Carla Souza. Salão de Beleza Carla. Rua das Flores 123, Goiânia. Instagram: @salaodacarla. Tel: (62) 99999-0000] cria essa cliente"
    operator: { name: "Elenice", jid: "5511999990000" }
    context: |
      Operadora: Elenice

      Clientes ativas: 2
        - Patricia (Salão de Beleza, Belo Horizonte)
        - Maria (Confeitaria, São Paulo)
    graders:
      - type: deterministic
        field: action_type
        equals: CUSTOMER_CREATE
      - type: llm_judge
        judge: no_hallucination
        criteria: "Agente extrai nome (Carla Souza ou Carla), tipo (Salão de Beleza), cidade (Goiânia), e instagram (@salaodacarla) da descrição do cartão. Não inventa dados."

  # Instagram profile link
  - id: w3_instagram_link
    message: "o instagram da Patricia é https://instagram.com/patriciabeleza"
    operator: { name: "Bruna", jid: "5511999991111" }
    context: |
      Operadora: Bruna

      Clientes ativas: 2
        - Patricia (Salão de Beleza, Belo Horizonte)
        - Maria (Confeitaria, São Paulo)
    graders:
      - type: deterministic
        field: action_type
        equals: CUSTOMER_UPDATE
      - type: llm_judge
        judge: no_hallucination
        criteria: "Agente extrai o handle @patriciabeleza do link e propõe atualizar o instagram da Patricia"

  # Blurry image -> can't read
  - id: w3_blurry_image
    message: "[Imagem: Imagem desfocada, não é possível identificar o conteúdo com clareza] o que diz aí?"
    operator: { name: "Elenice", jid: "5511999990000" }
    context: |
      Operadora: Elenice

      Clientes ativas: 2
    graders:
      - type: deterministic
        field: has_reply
        equals: "true"
      - type: llm_judge
        judge: no_hallucination
        criteria: "Agente diz honestamente que não conseguiu ler a imagem. Não inventa conteúdo."

  # Voice note -> transcription -> treat as text
  - id: w3_voice_note
    message: "como tá a Patricia?"
    operator: { name: "Bruna", jid: "5511999991111" }
    context: |
      Operadora: Bruna

      Clientes ativas: 3
        - Patricia (Salão de Beleza, Belo Horizonte)
        - Maria (Confeitaria, São Paulo)
        - Joana (Loja de Roupas, Rio de Janeiro)

      Posts gerados (total): 12
    graders:
      - type: deterministic
        field: has_reply
        equals: "true"
      - type: llm_judge
        judge: tone
        criteria: "Resposta em português brasileiro, menos de 300 caracteres, chama Bruna pelo nome, menciona dados da Patricia do contexto"

  # Forwarded message from known customer -> identify by phone
  - id: w3_forwarded_message
    message: "[Mensagem encaminhada de +5511988880000] Oi, queria marcar um horário pra fazer as unhas"
    operator: { name: "Elenice", jid: "5511999990000" }
    context: |
      Operadora: Elenice

      Clientes ativas: 3
        - Patricia (Salão de Beleza, Belo Horizonte, tel: 5511988880000)
        - Maria (Confeitaria, São Paulo)
        - Joana (Loja de Roupas, Rio de Janeiro)
    graders:
      - type: deterministic
        field: has_reply
        equals: "true"
      - type: llm_judge
        judge: no_hallucination
        criteria: "Agente identifica que a mensagem encaminhada é da Patricia (pelo telefone 5511988880000) e responde sobre ela"
