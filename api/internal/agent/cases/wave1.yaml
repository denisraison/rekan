tests:
  - id: w1_status_overview
    message: "como tá tudo?"
    operator: { name: "Elenice", jid: "5511999990000" }
    context: |
      Operadora: Elenice

      Clientes ativas: 8
        - Patricia (Salão de Beleza, Belo Horizonte)
        - Maria (Confeitaria, São Paulo)
        - Joana (Loja de Roupas, Rio de Janeiro)
        - Ana (Manicure, Goiânia)
        - Fernanda (Hamburgueria, Curitiba)
        - Cláudia (Pet Shop, Brasília)
        - Renata (Studio de Pilates, Salvador)
        - Luciana (Floricultura, Porto Alegre)

      Posts gerados (total): 24

      Últimas ações:
        - Bruna: CUSTOMER_LIST (listou 8 clientes)
    graders:
      - type: deterministic
        field: has_reply
        equals: "true"
      - type: llm_judge
        judge: tone
        criteria: "Resposta em português brasileiro, menos de 300 caracteres, chama Elenice pelo nome, menciona dados reais do contexto (clientes ou posts)"

  - id: w1_customer_list
    message: "quais são as clientes?"
    operator: { name: "Bruna", jid: "5511999991111" }
    context: |
      Operadora: Bruna

      Clientes ativas: 8
        - Patricia (Salão de Beleza, Belo Horizonte)
        - Maria (Confeitaria, São Paulo)
    graders:
      - type: deterministic
        field: action_type
        equals: CUSTOMER_LIST
      - type: llm_judge
        judge: no_hallucination
        criteria: "Só lista clientes que estão no contexto, não inventa nenhuma"

  - id: w1_status_question
    message: "quantas clientes a gente tem?"
    operator: { name: "Elenice", jid: "5511999990000" }
    context: |
      Operadora: Elenice

      Clientes ativas: 8
    graders:
      - type: deterministic
        field: has_reply
        equals: "true"
      - type: llm_judge
        judge: tone
        criteria: "Resposta em português brasileiro, menos de 300 caracteres, chama Elenice pelo nome, menciona o número 8"

  - id: w1_unclear_intent
    message: "oi"
    operator: { name: "Elenice", jid: "5511999990000" }
    context: |
      Operadora: Elenice

      Clientes ativas: 3
    graders:
      - type: deterministic
        field: has_reply
        equals: "true"
      - type: llm_judge
        judge: tone
        criteria: "Resposta em português brasileiro, menos de 300 caracteres, chama Elenice pelo nome, pede esclarecimento ou oferece ajuda de forma simpática"
