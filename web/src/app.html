<!doctype html>
<html lang="pt-BR">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Urbanist:ital,wght@0,200;0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet" />
		<link rel="manifest" href="/manifest.webmanifest" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			// Counteract pre-set browser page zoom on mobile
			if (window.visualViewport && window.visualViewport.scale !== 1) {
				var meta = document.querySelector('meta[name="viewport"]');
				var s = 1 / window.visualViewport.scale;
				meta.setAttribute('content',
					'width=device-width, initial-scale=' + s + ', maximum-scale=' + s + ', user-scalable=no');
			}
			// Prevent pinch-to-zoom
			document.addEventListener('touchstart', function(e) {
				if (e.touches.length > 1) e.preventDefault();
			}, { passive: false });
		</script>
		<script>
			if ('serviceWorker' in navigator) {
				navigator.serviceWorker.getRegistrations().then((regs) => {
					regs.forEach((r) => { r.unregister(); });
				});
				caches.keys().then((keys) => {
					keys.forEach((k) => { caches.delete(k); });
				});
			}
		</script>
	</body>
</html>
