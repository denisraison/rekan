tests:
  # Happy path: all fields in one message
  - id: w2_create_happy_path
    message: "cria a Patricia, salão de beleza em BH, atende mulheres do bairro, ambiente acolhedor e descontraído"
    operator: { name: "Elenice", jid: "5511999990000" }
    context: |
      Operadora: Elenice

      Clientes ativas: 2
        - Maria (Confeitaria, São Paulo)
        - Joana (Loja de Roupas, Rio de Janeiro)

      Posts gerados (total): 10
    graders:
      - type: deterministic
        field: has_reply
        equals: "true"
      - type: llm_judge
        judge: confirmation_flow
        criteria: "Agente lista os campos extraídos (nome, tipo, cidade, público-alvo, ambiente) e pede confirmação explícita antes de criar"

  # Incomplete: missing city, agent asks for it (no action yet, just reply)
  - id: w2_create_missing_city
    message: "cadastra a Fernanda, hamburgueria"
    operator: { name: "Bruna", jid: "5511999991111" }
    context: |
      Operadora: Bruna

      Clientes ativas: 1
        - Maria (Confeitaria, São Paulo)
    graders:
      - type: deterministic
        field: has_reply
        equals: "true"
      - type: llm_judge
        judge: confirmation_flow
        criteria: "Agente pede a cidade que está faltando, não tenta criar sem a informação"

  # Abbreviations: BH -> Belo Horizonte
  - id: w2_abbreviations
    message: "nova cliente: Ana, manicure, BH"
    operator: { name: "Elenice", jid: "5511999990000" }
    context: |
      Operadora: Elenice

      Clientes ativas: 0
    graders:
      - type: deterministic
        field: has_reply
        equals: "true"
      - type: llm_judge
        judge: no_hallucination
        criteria: "Agente interpreta 'BH' como 'Belo Horizonte'. Campos extraídos corretamente."

  # Cancel mid-flow
  - id: w2_cancel_flow
    message: "deixa"
    operator: { name: "Elenice", jid: "5511999990000" }
    context: |
      Operadora: Elenice

      Clientes ativas: 2
    conversation_history: |
      Elenice: cadastra a Fernanda, hamburgueria
      [Rekan]: Elenice, vou cadastrar: Fernanda, Hamburgueria. Qual a cidade?
      Elenice: deixa
    graders:
      - type: deterministic
        field: has_reply
        equals: "true"
      - type: llm_judge
        judge: state_management
        criteria: "Agente reconhece 'deixa' como cancelamento, confirma que cancelou, não continua pedindo informações"

  # Stale confirmation: "sim" with nothing pending
  - id: w2_stale_sim
    message: "sim"
    operator: { name: "Bruna", jid: "5511999991111" }
    context: |
      Operadora: Bruna

      Clientes ativas: 3
    graders:
      - type: deterministic
        field: has_reply
        equals: "true"
      - type: llm_judge
        judge: state_management
        criteria: "Agente responde algo como 'Sim pra quê?' ou 'Não tem nada pendente'. Não executa nenhuma ação."

  # Name collision: two Marias
  - id: w2_name_collision
    message: "como tá a Maria?"
    operator: { name: "Elenice", jid: "5511999990000" }
    context: |
      Operadora: Elenice

      Clientes ativas: 4
        - Maria Silva (Confeitaria, São Paulo)
        - Maria Santos (Manicure, Belo Horizonte)
        - Patricia (Salão de Beleza, Belo Horizonte)
        - Joana (Loja de Roupas, Rio de Janeiro)

      Posts gerados (total): 15
    graders:
      - type: deterministic
        field: has_reply
        equals: "true"
      - type: llm_judge
        judge: no_hallucination
        criteria: "Agente identifica que existem duas Marias e pede para especificar qual (Maria Silva da Confeitaria ou Maria Santos da Manicure). Não escolhe uma sozinho."

  # Duplicate detection: trying to create existing customer
  - id: w2_duplicate_detection
    message: "cria a Patricia, salão de beleza, Belo Horizonte"
    operator: { name: "Elenice", jid: "5511999990000" }
    context: |
      Operadora: Elenice

      Clientes ativas: 3
        - Patricia (Salão de Beleza, Belo Horizonte)
        - Maria (Confeitaria, São Paulo)
        - Joana (Loja de Roupas, Rio de Janeiro)
    graders:
      - type: deterministic
        field: has_reply
        equals: "true"
      - type: llm_judge
        judge: no_hallucination
        criteria: "Agente detecta que Patricia (Salão de Beleza, Belo Horizonte) já existe e avisa, não tenta criar duplicata"

  # Contextual inference: "muda a cidade" after discussing Patricia
  - id: w2_contextual_update
    message: "muda pra Contagem"
    operator: { name: "Bruna", jid: "5511999991111" }
    context: |
      Operadora: Bruna

      Clientes ativas: 3
        - Patricia (Salão de Beleza, Belo Horizonte)
        - Maria (Confeitaria, São Paulo)
        - Joana (Loja de Roupas, Rio de Janeiro)
    conversation_history: |
      Bruna: como tá a Patricia?
      [Rekan]: Bruna, a Patricia (Salão de Beleza, Belo Horizonte) está com 4 posts gerados.
      Bruna: muda pra Contagem
    graders:
      - type: deterministic
        field: has_reply
        equals: "true"
      - type: llm_judge
        judge: confirmation_flow
        criteria: "Agente entende do contexto que 'muda pra Contagem' se refere à cidade da Patricia e pede confirmação"

  # Customer info
  - id: w2_customer_info
    message: "me fala da Patricia"
    operator: { name: "Elenice", jid: "5511999990000" }
    context: |
      Operadora: Elenice

      Clientes ativas: 3
        - Patricia (Salão de Beleza, Belo Horizonte)
        - Maria (Confeitaria, São Paulo)
        - Joana (Loja de Roupas, Rio de Janeiro)

      Posts gerados (total): 15
    graders:
      - type: deterministic
        field: has_reply
        equals: "true"
      - type: llm_judge
        judge: no_hallucination
        criteria: "Agente mostra informações da Patricia usando dados do contexto, sem inventar"

  # Pause customer
  - id: w2_customer_pause
    message: "pausa a Joana, ela vai viajar"
    operator: { name: "Bruna", jid: "5511999991111" }
    context: |
      Operadora: Bruna

      Clientes ativas: 3
        - Patricia (Salão de Beleza, Belo Horizonte)
        - Maria (Confeitaria, São Paulo)
        - Joana (Loja de Roupas, Rio de Janeiro)
    graders:
      - type: deterministic
        field: has_reply
        equals: "true"
      - type: llm_judge
        judge: confirmation_flow
        criteria: "Agente confirma antes de pausar: menciona Joana e o motivo, pede confirmação"
