<!doctype html>
<html lang="pt-BR">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Urbanist:ital,wght@0,200;0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet" />
		<link rel="manifest" href="/manifest.webmanifest" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			if ('serviceWorker' in navigator) {
				// Clean up old Workbox SW: update first (fetches self-destructing stub from
				// server, which clears Cache Storage), then unregister. Remove after 2026-07-01.
				navigator.serviceWorker.getRegistrations().then(function (regs) {
					regs.forEach(function (r) {
						r.update().finally(function () { r.unregister(); });
					});
				});
				caches.keys().then(function (keys) {
					keys.forEach(function (k) { caches.delete(k); });
				});
				navigator.serviceWorker.addEventListener('controllerchange', function () { location.reload(); });
			}
		</script>
	</body>
</html>
