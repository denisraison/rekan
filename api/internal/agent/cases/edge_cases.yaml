tests:
  - id: edge_rename_customer
    message: "muda o nome da Nika pra Roupas Confortáveis da Nika"
    operator: { name: "Elenice", jid: "5511999990000" }
    context: |
      Operadora: Elenice

      Clientes ativas: 1
        - Nika (Moda Feminina sob Medida, São Caetano do Sul)
    graders:
      - type: deterministic
        field: tools_called
        contains: "update_customer"
      - type: deterministic
        field: tool_args
        equals: update_customer
        contains: "new_name"
      - type: llm_judge
        judge: tool_usage
        criteria: "Agente chama update_customer com new_name contendo 'Roupas Confortáveis da Nika'"

  - id: edge_impossible_request
    message: "manda um email pra Patricia"
    operator: { name: "Elenice", jid: "5511999990000" }
    context: |
      Operadora: Elenice

      Clientes ativas: 1
        - Patricia (Salão de Beleza, Belo Horizonte)
    graders:
      - type: deterministic
        field: has_reply
        equals: "true"
      - type: llm_judge
        judge: honesty
        criteria: "Agente admite que não consegue enviar email, não promete fazer algo que não pode"

  - id: edge_vague_update
    message: "muda a Patricia"
    operator: { name: "Elenice", jid: "5511999990000" }
    context: |
      Operadora: Elenice

      Clientes ativas: 1
        - Patricia (Salão de Beleza, Belo Horizonte)
    graders:
      - type: deterministic
        field: has_reply
        equals: "true"
      - type: llm_judge
        judge: clarification
        criteria: "Agente pergunta o que a operadora quer mudar na Patricia, em vez de não fazer nada ou inventar"

  - id: edge_update_multiple_fields
    message: "Patricia mudou pra Contagem e agora faz unha também"
    operator: { name: "Elenice", jid: "5511999990000" }
    context: |
      Operadora: Elenice

      Clientes ativas: 1
        - Patricia (Salão de Beleza, Belo Horizonte)
    graders:
      - type: deterministic
        field: tools_called
        contains: "update_customer"
      - type: deterministic
        field: tool_args
        equals: update_customer
        contains: "Contagem"
      - type: llm_judge
        judge: tool_usage
        criteria: "Agente chama update_customer com cidade Contagem e tipo atualizado"

  - id: edge_confirm_without_pending
    message: "sim"
    operator: { name: "Elenice", jid: "5511999990000" }
    context: |
      Operadora: Elenice

      Clientes ativas: 2
        - Patricia (Salão de Beleza, Belo Horizonte)
        - Maria (Confeitaria, São Paulo)
    conversation_history: |
      [Rekan]: Elenice, confirma a alteração?
      Elenice: sim
      [Rekan]: Elenice, Patricia atualizada! Campos: cidade.
    graders:
      - type: deterministic
        field: has_reply
        equals: "true"
      - type: llm_judge
        judge: no_hallucination
        criteria: "Agente reconhece que não há ação pendente, responde algo como 'sim pra quê?' sem inventar ação"

  - id: edge_customer_not_found
    message: "atualiza a Fernanda, muda pra SP"
    operator: { name: "Elenice", jid: "5511999990000" }
    context: |
      Operadora: Elenice

      Clientes ativas: 2
        - Patricia (Salão de Beleza, Belo Horizonte)
        - Maria (Confeitaria, São Paulo)
    graders:
      - type: deterministic
        field: has_reply
        equals: "true"
      - type: llm_judge
        judge: no_hallucination
        criteria: "Agente informa que Fernanda não foi encontrada, não inventa dados nem finge que atualizou"
