<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, initial-scale=1">
  <title>Perfil Extraído</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --coral: #F97368; --coral-light: #FDDCDA; --coral-pale: #FFF3F2;
      --sage: #87AA8C; --sage-light: #C8DEC9; --sage-pale: #F0F6F0;
      --charcoal: #111116; --text: #111116; --text-secondary: #555566;
      --text-muted: #999AAA; --bg: #FAFAF7; --surface: #FFFFFF;
      --border: rgba(17,17,22,0.07); --border-strong: rgba(17,17,22,0.14);
      --radius-sm: 6px; --radius-md: 12px; --radius-lg: 20px; --radius-full: 9999px;
    }
    * { font-family: 'Urbanist', system-ui, sans-serif; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); margin: 0; width: 390px; min-height: 844px; overflow-x: hidden; }
    label { display: block; font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
    input, select, textarea { width: 100%; padding: 14px 16px; border: 1.5px solid var(--border-strong); border-radius: var(--radius-md); font-size: 16px; font-family: 'Urbanist', system-ui, sans-serif; background: var(--surface); color: var(--text); outline: none; min-height: 52px; resize: none; }
    .filled { border-color: var(--sage); background: var(--sage-pale); }
  </style>
</head>
<body>
  <!-- Header -->
  <div style="background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10;">
    <button style="width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--bg); display: flex; align-items: center; justify-content: center;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="2"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
    </button>
    <span style="font-size: 20px; font-weight: 700; flex: 1;">Novo cliente</span>
  </div>

  <!-- Basic fields summary -->
  <div style="background: var(--surface); padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px;">
    <div style="width: 40px; height: 40px; border-radius: var(--radius-md); background: var(--sage-pale); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--sage)" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
    </div>
    <div>
      <p style="font-size: 16px; font-weight: 700; margin: 0 0 2px;">Salão da Mari</p>
      <p style="font-size: 14px; color: var(--text-secondary); margin: 0;">Salão de Beleza · Manaus, AM</p>
    </div>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" style="margin-left: auto;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
  </div>

  <!-- Success banner -->
  <div style="background: var(--sage-pale); border-bottom: 1.5px solid var(--sage-light); padding: 14px 20px; display: flex; align-items: center; gap: 12px;">
    <div style="width: 32px; height: 32px; border-radius: 50%; background: var(--sage); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div>
      <p style="font-size: 15px; font-weight: 700; color: var(--text); margin: 0 0 2px;">Perfil extraído da gravação</p>
      <p style="font-size: 14px; color: var(--text-secondary); margin: 0;">Revise os campos antes de salvar.</p>
    </div>
  </div>

  <div style="padding: 24px 20px 140px;">

    <p style="font-size: 13px; font-weight: 700; letter-spacing: 0.08em; color: var(--text-muted); text-transform: uppercase; margin: 0 0 20px;">Perfil do negócio</p>

    <!-- Services -->
    <div style="margin-bottom: 20px;">
      <label>Serviços</label>
      <div style="display: flex; flex-direction: column; gap: 10px;">
        <div style="display: flex; gap: 10px; align-items: center;">
          <input class="filled" type="text" value="Corte Feminino" style="flex: 1;">
          <input class="filled" type="text" value="R$ 60" style="width: 88px;">
          <button style="width: 36px; height: 52px; border: none; background: none; color: var(--text-muted); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">×</button>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
          <input class="filled" type="text" value="Progressiva" style="flex: 1;">
          <input class="filled" type="text" value="R$ 150" style="width: 88px;">
          <button style="width: 36px; height: 52px; border: none; background: none; color: var(--text-muted); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">×</button>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
          <input class="filled" type="text" value="Hidratação" style="flex: 1;">
          <input class="filled" type="text" value="R$ 80" style="width: 88px;">
          <button style="width: 36px; height: 52px; border: none; background: none; color: var(--text-muted); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">×</button>
        </div>
        <button style="width: 100%; height: 48px; border: 1.5px dashed var(--border-strong); border-radius: var(--radius-md); background: none; font-size: 15px; color: var(--text-muted); cursor: pointer; font-family: 'Urbanist', sans-serif;">+ Adicionar serviço</button>
      </div>
    </div>

    <!-- Target audience -->
    <div style="margin-bottom: 20px;">
      <label>Público</label>
      <textarea class="filled" rows="2">Mulheres de 25 a 50 anos que moram no Adrianópolis</textarea>
    </div>

    <!-- Brand vibe -->
    <div style="margin-bottom: 20px;">
      <label>Estilo do negócio</label>
      <textarea class="filled" rows="2">Acolhedor, atendimento personalizado, ambiente familiar</textarea>
    </div>

    <!-- Quirks -->
    <div style="margin-bottom: 20px;">
      <label>Diferenciais</label>
      <div style="display: flex; flex-direction: column; gap: 10px;">
        <div style="display: flex; gap: 10px; align-items: center;">
          <input class="filled" type="text" value="Serve café e biscoito na espera" style="flex: 1;">
          <button style="width: 36px; height: 52px; border: none; background: none; color: var(--text-muted); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">×</button>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
          <input class="filled" type="text" value="Fecha às segundas" style="flex: 1;">
          <button style="width: 36px; height: 52px; border: none; background: none; color: var(--text-muted); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">×</button>
        </div>
        <button style="width: 100%; height: 48px; border: 1.5px dashed var(--border-strong); border-radius: var(--radius-md); background: none; font-size: 15px; color: var(--text-muted); cursor: pointer; font-family: 'Urbanist', sans-serif;">+ Adicionar diferencial</button>
      </div>
    </div>

    <!-- Re-record option -->
    <div style="text-align: center; padding: 8px 0 4px;">
      <button style="border: none; background: none; color: var(--text-muted); font-size: 15px; font-family: 'Urbanist', sans-serif; cursor: pointer; padding: 12px; display: inline-flex; align-items: center; gap: 6px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1M12 18v4M8 22h8" stroke-linecap="round"/></svg>
        Gravar de novo
      </button>
    </div>
  </div>

  <!-- Bottom save bar -->
  <div style="position: fixed; bottom: 0; left: 0; width: 390px; padding: 16px 20px 36px; background: var(--surface); border-top: 1px solid var(--border);">
    <button style="width: 100%; height: 56px; background: var(--coral); border: none; border-radius: var(--radius-full); font-size: 18px; font-weight: 700; color: white; cursor: pointer; font-family: 'Urbanist', sans-serif; box-shadow: 0 4px 16px rgba(249,115,104,0.3);">Salvar e continuar</button>
  </div>
</body>
</html>
