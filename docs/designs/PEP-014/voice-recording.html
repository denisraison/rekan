<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=390, initial-scale=1" />
    <title>Gravando</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --coral: #f97368;
        --coral-light: #fddcda;
        --coral-pale: #fff3f2;
        --sage: #87aa8c;
        --sage-light: #c8dec9;
        --sage-pale: #f0f6f0;
        --charcoal: #111116;
        --text: #111116;
        --text-secondary: #555566;
        --text-muted: #999aaa;
        --bg: #fafaf7;
        --surface: #ffffff;
        --border: rgba(17, 17, 22, 0.07);
        --border-strong: rgba(17, 17, 22, 0.14);
        --radius-sm: 6px;
        --radius-md: 12px;
        --radius-lg: 20px;
        --radius-full: 9999px;
      }
      * {
        font-family: 'Urbanist', system-ui, sans-serif;
        box-sizing: border-box;
      }
      body {
        background: var(--bg);
        color: var(--text);
        margin: 0;
        width: 390px;
        min-height: 844px;
        overflow-x: hidden;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.12);
          opacity: 0.75;
        }
      }
      @keyframes ring {
        0% {
          transform: scale(1);
          opacity: 0.6;
        }
        100% {
          transform: scale(1.6);
          opacity: 0;
        }
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.2;
        }
      }
      .pulse-btn {
        animation: pulse 1.4s ease-in-out infinite;
      }
      .ring {
        position: absolute;
        width: 96px;
        height: 96px;
        border-radius: 50%;
        border: 3px solid #ef4444;
        animation: ring 1.4s ease-out infinite;
      }
      .ring-2 {
        animation-delay: 0.7s;
      }
      .blink {
        animation: blink 1s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <div
      style="
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 16px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
      "
    >
      <button
        style="
          width: 40px;
          height: 40px;
          border-radius: 50%;
          border: none;
          background: var(--bg);
          display: flex;
          align-items: center;
          justify-content: center;
        "
      >
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="var(--text-secondary)"
          stroke-width="2"
        >
          <path d="M19 12H5M5 12l7-7M5 12l7 7" />
        </svg>
      </button>
      <span style="font-size: 20px; font-weight: 700; flex: 1">Novo cliente</span>
    </div>

    <!-- Basic fields summary (collapsed) -->
    <div
      style="
        background: var(--surface);
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 12px;
      "
    >
      <div
        style="
          width: 40px;
          height: 40px;
          border-radius: var(--radius-md);
          background: var(--sage-pale);
          display: flex;
          align-items: center;
          justify-content: center;
          flex-shrink: 0;
        "
      >
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="var(--sage)"
          stroke-width="2"
        >
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9,22 9,12 15,12 15,22" />
        </svg>
      </div>
      <div>
        <p style="font-size: 16px; font-weight: 700; margin: 0 0 2px">Salão da Mari</p>
        <p style="font-size: 14px; color: var(--text-secondary); margin: 0">
          Salão de Beleza · Manaus, AM
        </p>
      </div>
      <svg
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="var(--text-muted)"
        stroke-width="2"
        style="margin-left: auto"
      >
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z" />
      </svg>
    </div>

    <div style="padding: 32px 20px 160px">
      <!-- Recording active state -->
      <div style="display: flex; flex-direction: column; align-items: center; padding: 16px 0 32px">
        <!-- Pulsing ring + button -->
        <div
          style="
            position: relative;
            width: 160px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
          "
        >
          <div class="ring"></div>
          <div class="ring ring-2"></div>
          <button
            class="pulse-btn"
            style="
              width: 96px;
              height: 96px;
              border-radius: 50%;
              background: #ef4444;
              border: none;
              display: flex;
              align-items: center;
              justify-content: center;
              cursor: pointer;
              box-shadow: 0 4px 24px rgba(239, 68, 68, 0.4);
              position: relative;
              z-index: 1;
            "
          >
            <svg width="40" height="40" viewBox="0 0 24 24" fill="white">
              <path d="M12 2a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z" />
              <path
                d="M19 10v1a7 7 0 0 1-14 0v-1M12 18v4M8 22h8"
                stroke="white"
                stroke-width="1.5"
                fill="none"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </div>

        <!-- Timer + status -->
        <div style="display: flex; align-items: center; gap: 8px; margin-top: 20px">
          <div
            class="blink"
            style="width: 10px; height: 10px; border-radius: 50%; background: #ef4444"
          ></div>
          <span
            style="font-size: 28px; font-weight: 700; letter-spacing: 0.05em; color: var(--text)"
            >0:42</span
          >
        </div>
        <p style="font-size: 16px; color: var(--text-secondary); margin: 6px 0 0">Gravando...</p>
      </div>

      <!-- Prompt card -->
      <div
        style="
          background: var(--surface);
          border: 1.5px solid var(--border-strong);
          border-radius: var(--radius-lg);
          padding: 20px;
          margin-bottom: 32px;
        "
      >
        <p
          style="
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin: 0 0 12px;
          "
        >
          Pode falar sobre...
        </p>
        <div style="display: flex; flex-direction: column; gap: 12px">
          <div style="display: flex; gap: 12px; align-items: flex-start">
            <div
              style="
                width: 28px;
                height: 28px;
                border-radius: 50%;
                background: var(--coral-pale);
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
                margin-top: 1px;
              "
            >
              <span style="font-size: 13px">✂️</span>
            </div>
            <p style="font-size: 16px; color: var(--text); margin: 0; line-height: 1.5">
              Que serviços ela faz e quanto cobra?
            </p>
          </div>
          <div style="display: flex; gap: 12px; align-items: flex-start">
            <div
              style="
                width: 28px;
                height: 28px;
                border-radius: 50%;
                background: var(--coral-pale);
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
                margin-top: 1px;
              "
            >
              <span style="font-size: 13px">👥</span>
            </div>
            <p style="font-size: 16px; color: var(--text); margin: 0; line-height: 1.5">
              Quem são os clientes dela?
            </p>
          </div>
          <div style="display: flex; gap: 12px; align-items: flex-start">
            <div
              style="
                width: 28px;
                height: 28px;
                border-radius: 50%;
                background: var(--coral-pale);
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
                margin-top: 1px;
              "
            >
              <span style="font-size: 13px">⭐</span>
            </div>
            <p style="font-size: 16px; color: var(--text); margin: 0; line-height: 1.5">
              O que ela faz diferente das outras?
            </p>
          </div>
        </div>
        <div style="margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border)">
          <p
            style="
              font-size: 14px;
              color: var(--text-muted);
              margin: 0;
              line-height: 1.5;
              font-style: italic;
            "
          >
            Fala do jeito que quiser, sem pressa. Não precisa seguir a ordem.
          </p>
        </div>
      </div>
    </div>

    <!-- Bottom: PARAR button -->
    <div
      style="
        position: fixed;
        bottom: 0;
        left: 0;
        width: 390px;
        padding: 16px 20px 36px;
        background: var(--surface);
        border-top: 1px solid var(--border);
      "
    >
      <button
        style="
          width: 100%;
          height: 60px;
          background: var(--text);
          border: none;
          border-radius: var(--radius-full);
          font-size: 20px;
          font-weight: 700;
          color: white;
          cursor: pointer;
          font-family: 'Urbanist', sans-serif;
          letter-spacing: 0.02em;
        "
      >
        Parar gravação
      </button>
    </div>
  </body>
</html>
