tests:
  # Typed params: create with required fields
  - id: w4_create_typed_params
    message: "cria a Fernanda, hamburgueria em Goiânia"
    operator: { name: "Elenice", jid: "5511999990000" }
    context: |
      Operadora: Elenice

      Clientes ativas: 1
        - Patricia (Salão de Beleza, Belo Horizonte)
    graders:
      - type: deterministic
        field: action_type
        equals: CUSTOMER_CREATE
      - type: llm_judge
        judge: confirmation_flow
        criteria: "Agente lista campos extraídos e pede confirmação"

  # Typed params: create with all optional fields
  - id: w4_create_all_optional_fields
    message: "cria a Carla, salão de beleza em BH, tel 31999990000, atende mulheres 25-50, ambiente acolhedor e familiar, faz progressiva e é referência no bairro"
    operator: { name: "Bruna", jid: "5511999991111" }
    context: |
      Operadora: Bruna

      Clientes ativas: 0
    graders:
      - type: deterministic
        field: action_type
        equals: CUSTOMER_CREATE
      - type: llm_judge
        judge: no_hallucination
        criteria: "Agente extrai todos os campos: name (Carla), type (salão de beleza), city (Belo Horizonte), phone (31999990000), target_audience (mulheres 25-50), brand_vibe (acolhedor e familiar), quirks (progressiva, referência no bairro). Nenhum campo inventado."

  # Typed params: update returns only changed fields
  - id: w4_update_typed_params
    message: "muda a Patricia pra Contagem"
    operator: { name: "Bruna", jid: "5511999991111" }
    context: |
      Operadora: Bruna

      Clientes ativas: 2
        - Patricia (Salão de Beleza, Belo Horizonte)
        - Maria (Confeitaria, São Paulo)
    conversation_history: |
      Bruna: como tá a Patricia?
      [Rekan]: Bruna, a Patricia (Salão de Beleza, Belo Horizonte) está com 4 posts gerados.
      Bruna: muda a Patricia pra Contagem
    graders:
      - type: deterministic
        field: action_type
        equals: CUSTOMER_UPDATE
      - type: llm_judge
        judge: confirmation_flow
        criteria: "Agente identifica que é uma mudança de cidade da Patricia para Contagem e pede confirmação"

  # Typed params: approve with post_id
  - id: w4_approve_typed_params
    message: "aprova o post da Patricia"
    operator: { name: "Elenice", jid: "5511999990000" }
    context: |
      Operadora: Elenice

      Clientes ativas: 2
        - Patricia (Salão de Beleza, Belo Horizonte)
        - Maria (Confeitaria, São Paulo)

      Posts pendentes de revisão: 1
        - Patricia: "Hoje no salão foi dia de transformação..." (post_001)

      Posts gerados (total): 5
    graders:
      - type: deterministic
        field: action_type
        equals: POST_APPROVE
      - type: llm_judge
        judge: confirmation_flow
        criteria: "Agente confirma aprovação do post da Patricia, mencionando o post_id"
